<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TimeTracker — Вхід</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 56px; }
    footer { background: #f8f9fa; padding: 1rem 0; margin-top: 2rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html">TimeTracker</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">Головна сторінка</a></li>
          <li class="nav-item"><a class="nav-link" href="registration.html">Реєстрація</a></li>
          <li class="nav-item active"><a class="nav-link" href="login.html">Вхід</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <h1 class="mb-4">Вхід до сайту</h1>
    <form>
      <div class="mb-3">
        <label for="emailLogin" class="form-label">Email</label>
        <input type="email" class="form-control" id="emailLogin" placeholder="name@example.com">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Пароль</label>
        <input type="password" class="form-control" id="password" placeholder="Пароль">
      </div>
      <button type="submit" class="btn btn-primary">Увійти</button>
    </form>
  </main>

  <footer class="text-center">
    <div class="container">
      <p>© 2025 TimeTracker. Усі права захищено.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
