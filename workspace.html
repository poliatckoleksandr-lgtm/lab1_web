<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TimeTracker — Робоча сторінка</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 56px; }
    footer { background: #f8f9fa; padding: 1rem 0; margin-top: 2rem; }
    .timer-display { font-size: 2rem; font-weight: bold; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
    <div class="container">
      <a class="navbar-brand" href="workspace.html">TimeTracker</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item active"><a class="nav-link" href="workspace.html">Головна сторінка</a></li>
          <li class="nav-item"><a class="nav-link" href="html/registration.html">Реєстрація</a></li>
          <li class="nav-item"><a class="nav-link" href="html/login.html">Вхід</a></li>
          <li class="nav-item"><a class="nav-link" href="html/profile.html">Профіль</a></li>
          <li class="nav-item"><a class="nav-link" href="html/about.html">Про додаток</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <h1 class="mb-4">Облік робочого часу</h1>

    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Таймер роботи</h5>
        <div class="d-flex align-items-center mb-3">
          <span class="timer-display me-3">00:00:00</span>
          <div>
            <button class="btn btn-success me-2">Почати</button>
            <button class="btn btn-warning me-2">Призупинити</button>
            <button class="btn btn-info me-2">Продовжити</button>
            <button class="btn btn-danger">Зупинити</button>
          </div>
        </div>
        <form>
          <div class="row g-3">
            <div class="col-md-4">
              <label for="sessionName" class="form-label">Назва сесії</label>
              <input type="text" class="form-control" id="sessionName" placeholder="Наприклад: Робота над проектом">
            </div>
            <div class="col-md-4">
              <label for="startTime" class="form-label">Час початку</label>
              <input type="text" class="form-control" id="startTime" placeholder="00:00:00" readonly>
            </div>
            <div class="col-md-4">
              <label for="endTime" class="form-label">Час завершення</label>
              <input type="text" class="form-control" id="endTime" placeholder="00:00:00" readonly>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Історія сесій</h5>
        <table class="table table-striped">
          <thead>
            <tr>
              <th>#</th>
              <th>Назва</th>
              <th>Час початку</th>
              <th>Час завершення</th>
              <th>Тривалість</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>Приклад сесії</td>
              <td>09:00:00</td>
              <td>11:30:00</td>
              <td>2:30:00</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="text-center">
    <div class="container">
      <p>© 2025 TimeTracker. Усі права захищено.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
